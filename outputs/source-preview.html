<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Source Music Core Preview</title>
  <style>
    :root { color-scheme: dark; --lime: #d8f36b; --ink: #070809; --panel: #111713; --muted: #a4ad9d; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at 50% 0, #263228 0, var(--ink) 46%); color: #f4f5ef; font: 16px/1.5 Arial, sans-serif; }
    .shell { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
    .topline { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-bottom: 18px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
    .topline strong { color: var(--lime); font-size: .8rem; }
    .hero { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(280px, .85fr); gap: 24px; align-items: stretch; }
    .poster-wrap { min-height: 540px; perspective: 1200px; }
    .poster { position: relative; height: 100%; min-height: 540px; overflow: hidden; border: 1px solid #d8f36b55; border-radius: 16px; background: #0c100d; transform-style: preserve-3d; transition: transform .2s ease-out, box-shadow .2s ease-out; box-shadow: 0 24px 70px #000b; }
    .poster img { width: 100%; height: 100%; display: block; object-fit: cover; opacity: .78; transform: translateZ(20px) scale(1.04); filter: saturate(1.22) contrast(1.08); }
    .poster::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, #05070655, transparent 45%, #d8f36b30); pointer-events: none; }
    .poster-copy { position: absolute; z-index: 2; inset: auto 28px 28px; transform: translateZ(100px); text-shadow: 0 3px 24px #000; }
    .poster-copy small { color: var(--lime); letter-spacing: .18em; }
    .poster-copy h1 { max-width: 8ch; margin: 8px 0; font-size: clamp(2.5rem, 7vw, 5.6rem); line-height: .86; }
    .panel { border: 1px solid #ffffff1f; border-radius: 12px; background: #101510dd; padding: 24px; box-shadow: 0 18px 50px #0008; }
    .panel h2 { margin: 0 0 8px; font-size: 1.2rem; }
    .panel p { color: var(--muted); margin: 0 0 22px; }
    .status { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: .9rem; }
    button { border: 1px solid #d8f36b66; border-radius: 999px; padding: 12px 18px; background: transparent; color: #f4f5ef; cursor: pointer; font: inherit; }
    button.primary { background: var(--lime); color: #10150d; font-weight: 700; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
    canvas { width: 100%; height: 170px; display: block; border-top: 1px solid #ffffff16; border-bottom: 1px solid #ffffff16; background: repeating-linear-gradient(90deg, #101a13 0 1px, transparent 1px 24px); }
    pre { max-height: 238px; overflow: auto; margin: 16px 0 0; padding: 16px; border: 1px solid #ffffff17; border-radius: 8px; background: #080b09; color: #d8f36b; font: 12px/1.55 Consolas, monospace; white-space: pre-wrap; }
    .source-link { display: inline-block; margin-top: 14px; color: var(--lime); }
    @media (max-width: 760px) { .hero { grid-template-columns: 1fr; } .poster-wrap, .poster { min-height: 460px; } .shell { width: min(100% - 20px, 1180px); padding-top: 18px; } }
  </style>
</head>
<body>
  <main class="shell">
    <div class="topline"><strong>Source §3 / SOUNDS CORE</strong><span>Retro Reconstruction Player</span></div>
    <section class="hero">
      <div class="poster-wrap"><div class="poster" data-poster><img src="gpt6-poster-reference.png" alt="GTA6 复古海报"><div class="poster-copy"><small>GTA6 POSTER / MUSIC CORE</small><h1>Retro<br>Reconstruction</h1><span>网页视觉层保留，Source 负责音乐核心。</span></div></div></div>
      <section class="panel">
        <h2>Source 音乐核心预览</h2>
        <p>这不是把网页强行转成 Source，而是用同一组音符数据展示 Source §3 可迁移的部分。</p>
        <div class="actions"><button class="primary" type="button" data-play>播放旋律</button><button type="button" data-stop>停止</button></div>
        <div class="status"><span data-state>等待播放</span><span data-time>00:00</span></div>
        <canvas width="800" height="170" data-spectrum></canvas>
        <pre data-code>正在读取 Source 代码…</pre>
        <a class="source-link" href="https://docs.sourceacademy.org/source_3/" target="_blank" rel="noreferrer">打开 Source §3 文档 →</a>
      </section>
    </section>
  </main>
  <script src="never-gonna-give-you-up-looper.js"></script>
  <script>
    'use strict';
    const melody = [72, 72, 76, 79, 79, 76, 72, 67, 69, 69, 72, 76, 76, 72, 69, 67];
    const bpm = 113;
    const stepSeconds = 60 / bpm / 2;
    const songDuration = 50;
    const poster = document.querySelector('[data-poster]');
    const canvas = document.querySelector('[data-spectrum]');
    const context = canvas.getContext('2d');
    const stateLabel = document.querySelector('[data-state]');
    const timeLabel = document.querySelector('[data-time]');
    let isPlaying = false;
    let startedAt = 0;
    let animationId = 0;

    // 功能：把 MIDI 音高转为频率；入参为 MIDI 数字；返回赫兹值。
    function midiToFrequency(midiNumber) {
      return 440 * Math.pow(2, (midiNumber - 69) / 12);
    }

    // 功能：停止当前预览；无入参；返回值为 undefined；重复调用安全。
    function stopPreview() {
      if (typeof window.stopNeverGonnaGiveYouUp === 'function') {
        window.stopNeverGonnaGiveYouUp();
      }
      isPlaying = false;
      startedAt = 0;
      window.cancelAnimationFrame(animationId);
      stateLabel.textContent = '等待播放';
      timeLabel.textContent = '00:00';
      drawSpectrum(0);
    }

    // 功能：绘制程序化光谱；入参为当前时间戳；返回值为下一帧请求句柄。
    function drawSpectrum(timestamp) {
      const width = canvas.width;
      const height = canvas.height;
      const pulse = isPlaying ? (Math.sin(timestamp / 160) + 1) / 2 : .12;
      context.clearRect(0, 0, width, height);
      for (let index = 0; index < 48; index += 1) {
        const wave = Math.abs(Math.sin(index * .53 + timestamp / 700));
        const barHeight = height * (.05 + wave * (.18 + pulse * .58));
        context.fillStyle = index % 3 === 0 ? '#d8f36b' : index % 3 === 1 ? '#8fb6d9' : '#f09a61';
        context.fillRect(index * width / 48, height - barHeight, Math.max(4, width / 140), barHeight);
      }
      if (isPlaying) {
        const elapsed = Math.min((performance.now() - startedAt) / 1000, songDuration);
        timeLabel.textContent = `00:${String(Math.floor(elapsed)).padStart(2, '0')}`;
        animationId = window.requestAnimationFrame(drawSpectrum);
      }
      return animationId;
    }

    // 功能：按音符数组安排试听；无入参；返回值为 Promise；浏览器不支持音频时显示错误。
    function playPreview() {
      stopPreview();
      startedAt = performance.now();
      isPlaying = true;
      stateLabel.textContent = '正在播放原曲 50 秒 looper';
      if (typeof window.playNeverGonnaGiveYouUp !== 'function') {
        stateLabel.textContent = '原曲脚本加载失败';
        isPlaying = false;
        return;
      }
      window.playNeverGonnaGiveYouUp().catch((error) => {
        stateLabel.textContent = '原曲播放失败：' + error.message;
        isPlaying = false;
      });
      animationId = window.requestAnimationFrame(drawSpectrum);
      window.setTimeout(stopPreview, songDuration * 1000 + 500);
    }

    // 功能：读取并展示 Source 文件；无入参；返回值为 Promise；读取失败显示原因。
    async function loadSourceCode() {
      const codePanel = document.querySelector('[data-code]');
      try {
        const response = await fetch('source/retro-music-source3.js');
        codePanel.textContent = await response.text();
      } catch (error) {
        codePanel.textContent = 'Source 文件读取失败：' + error.message;
      }
    }

    poster.addEventListener('pointermove', (event) => {
      const bounds = poster.getBoundingClientRect();
      const rotateX = ((event.clientY - bounds.top) / bounds.height - .5) * -8;
      const rotateY = ((event.clientX - bounds.left) / bounds.width - .5) * 10;
      poster.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });
    poster.addEventListener('pointerleave', () => { poster.style.transform = 'rotateX(0deg) rotateY(0deg)'; });
    document.querySelector('[data-play]').addEventListener('click', playPreview);
    document.querySelector('[data-stop]').addEventListener('click', stopPreview);
    drawSpectrum(0);
    loadSourceCode();
  </script>
</body>
</html>
